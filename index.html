<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ballon-Spiel</title>
  <!--link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet"-->
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    html { 
      height: 100dvh; 
    }
    body {
      overflow: hidden; 
      height: 100dvh;
      background: DeepSkyBlue url("./wolken-hintergrundbild.jpg") center / cover no-repeat;
      cursor: none;
      touch-action: none;
    }

    /* Animierbares CSS-Custom-Property für Wind – Compositor-Thread */
    @property --wind-x {
      syntax: '<length>';
      inherits: true;
      initial-value: 0px;
    }
    :root {
      --wind-x: 0px;
      transition: --wind-x 5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    /* Horizontales Schaukeln pro Ballon – Amplitude via --wamp */
    @keyframes wobble {
      0%   { transform: translateX(0px); }
      25%  { transform: translateX(var(--wamp, 20px)); }
      75%  { transform: translateX(calc(-1 * var(--wamp, 20px))); }
      100% { transform: translateX(0px); }
    }

    /* Wind per CSS-Variable auf dem Element; Positionierung per left/top */
    .balloon { 
      position: absolute; 
      user-select: none; 
      cursor: none;
      pointer-events: none; 
      z-index: 1;
      transform: translateX(var(--wind-x, 0px));
    }

    /* Inneres Div: nur für Wobble-Animation */
    .balloon-sway {
      animation: wobble var(--wdur, 4s) ease-in-out infinite;
      animation-delay: var(--wdelay, 0s);
    }

    #counter {
      position: fixed; 
      top: 12px; 
      left: 16px;
      /*font-family: 'Bangers', sans-serif;*/
      font-family: sans-serif;
      font-size: 22px; 
      letter-spacing: 1px;
      color: midnightblue; 
      opacity: 0.45;
      line-height: 1.4; 
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="counter">flew: 0<br>fang: 0</div>
  <!-- Einmalige Gradient-Definitionen, eine pro Farbe, kein Wachstum über Zeit -->
  <svg width="0" height="0" style="position:absolute" xmlns="http://www.w3.org/2000/svg">
    <defs id="shared-defs"></defs>
  </svg>

  <script>
    // === KONFIGURATION ===
    const BALLOON_COUNT = 13;
    const RISE_SPEED    = 42; // px/s Basis

    // Geschwindigkeitsfunktionen (t = Lebenszeit in Sekunden)
    // Rückgabe: Multiplikator für RISE_SPEED; wird auf min. 0.05 geclampt
    const SPEED_FUNS = [
      t => 1,                                                          // konstant
      t => 1 + 0.4  * Math.sin(t * 1.5),                             // sinuswelle
      t => 1 + 0.3  * Math.sin(t * 2) + 0.15 * Math.sin(t * 5.3),   // doppelwelle
      t => 0.55     + 0.45 * Math.abs(Math.sin(t * 0.8)),             // atemrhythmus
      t => 1 + 0.7  * Math.sin(t * 0.7) ** 2,                        // stoßweise
    ];

    // Wind-Konfiguration
    const WIND_MIN_MS  = 8000;   // kürzeste Pause zwischen Windstößen
    const WIND_MAX_MS  = 20000;  // längste Pause
    const WIND_MAX_PX  = 60;     // maximaler Versatz in px
    // =====================

    const W = 200, H = 300;   // dargestellte Ballongröße in px

    const COLORS = [
      '#f114d8','#f08080','#ff6eb4','#c71585','#ff00ff',
      //'#e76f51','#8338ec','#06d6a0','#ff006e','#3a86ff'
    ];

    // Burst-Parameter
    const SPIKES      = 7;
    const INNER_PULL  = 0.25;
    const POP_DURATION = 500;

    // Ballon-Ellipse in SVG-Koordinaten
    const EX = 340, EY = 210, ERX = 140, ERY = 175;

    let uid = 0;
    const balloons = new Map(); // uid → state
    let spawnTimer = 0;
    let lastTime   = null;
    let cFlew = 0, cFang = 0;
    let prevW = window.innerWidth;
    let prevH = window.innerHeight;

    // Wind-State
    let windTimer = 0;

    function scheduleWind() {
      windTimer = WIND_MIN_MS + Math.random() * (WIND_MAX_MS - WIND_MIN_MS);
    }

    function applyWind() {
      const px = (Math.random() * 2 - 1) * WIND_MAX_PX;
      document.documentElement.style.setProperty('--wind-x', px.toFixed(1) + 'px');
      scheduleWind();
    }

    scheduleWind();

    function updateCounter() {
      document.getElementById('counter').innerHTML = `flew: ${cFlew}<br>fang: ${cFang}`;
    }

    function colorMix(base, target, pct) {
      // Returns CSS color-mix string
      return `color-mix(in srgb, ${base} ${pct}%, ${target})`;
    }

    // Gradienten einmalig pro Farbe anlegen
    const sharedDefs = document.getElementById('shared-defs');
    COLORS.forEach((color, ci) => {
      const dark  = colorMix(color, 'black', 60);
      const light = colorMix(color, 'white', 70);
      sharedDefs.innerHTML += `
        <radialGradient id="gbg${ci}" cx="38%" cy="35%" r="55%">
          <stop offset="0%"   stop-color="${light}"/>
          <stop offset="60%"  stop-color="${color}"/>
          <stop offset="100%" stop-color="${dark}"/>
        </radialGradient>
        <radialGradient id="gsh${ci}" cx="35%" cy="30%" r="30%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>`;
    });

    function computeTips(ox, oy) {
      return Array.from({ length: SPIKES }, (_, i) => {
        const a  = (i / SPIKES) * Math.PI * 2 - Math.PI / 2;
        const ca = Math.cos(a), sa = Math.sin(a);
        const dx = ox - EX, dy = oy - EY;
        const A  = ca*ca/(ERX*ERX) + sa*sa/(ERY*ERY);
        const B  = 2*(dx*ca/(ERX*ERX) + dy*sa/(ERY*ERY));
        const C  = dx*dx/(ERX*ERX) + dy*dy/(ERY*ERY) - 1;
        const disc = B*B - 4*A*C;
        const t  = disc >= 0 ? (-B + Math.sqrt(disc)) / (2*A) : ERX;
        return { x: ox + t*ca, y: oy + t*sa };
      });
    }

    function burstPath(p, ox, oy, tips) {
      const pts = tips.map(tip => ({
        x: ox + (tip.x - ox) * p,
        y: oy + (tip.y - oy) * p
      }));
      let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
      for (let i = 0; i < SPIKES; i++) {
        const next = pts[(i + 1) % SPIKES];
        const cpx  = (ox + ((pts[i].x + next.x) / 2 - ox) * INNER_PULL * p).toFixed(1);
        const cpy  = (oy + ((pts[i].y + next.y) / 2 - oy) * INNER_PULL * p).toFixed(1);
        d += ` Q${cpx},${cpy} ${next.x.toFixed(1)},${next.y.toFixed(1)}`;
      }
      return d + 'Z';
    }

    function createBalloonEl(ci) {
      const dark  = colorMix(COLORS[ci], 'black', 60);
      const light = colorMix(COLORS[ci], 'white', 70);

      // Zufällige Wobble-Parameter
      const wamp   = (8 + Math.random() * 28).toFixed(1) + 'px';
      const wdur   = (3 + Math.random() * 5).toFixed(2) + 's';
      const wdelay = (-Math.random() * 5).toFixed(2) + 's';

      const outer = document.createElement('div');
      outer.className = 'balloon';
      outer.style.cssText = `width:${W}px;height:${H}px`;

      const inner = document.createElement('div');
      inner.className = 'balloon-sway';
      inner.style.cssText = `--wamp:${wamp};--wdur:${wdur};--wdelay:${wdelay}`;

      inner.innerHTML = `<svg viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="pointer-events:none">
        <g class="body">
          <ellipse cx="340" cy="210" rx="140" ry="175" fill="url(#gbg${ci})" style="pointer-events:all;cursor:crosshair"/>
          <ellipse cx="340" cy="210" rx="140" ry="175" fill="url(#gsh${ci})" style="pointer-events:none"/>
          <polygon points="340,375 328,396 352,396" fill="${dark}" style="pointer-events:none"/>
        </g>
        <path class="burst" fill="${light}" opacity="0"/>
      </svg>`;

      outer.appendChild(inner);
      return outer;
    }

    function spawnBalloon() {
      const id      = uid++;
      const ci      = Math.floor(Math.random() * COLORS.length);
      const left    = W / 2 + Math.random() * (window.innerWidth - W);
      const top     = window.innerHeight + 10;
      const speedFn = SPEED_FUNS[Math.floor(Math.random() * SPEED_FUNS.length)];

      const el = createBalloonEl(ci);
      el.style.left = (left - W / 2) + 'px';
      el.style.top  = top + 'px';
      document.body.appendChild(el);

      const state = { el, top, left, popping: false, age: 0, speedFn };
      balloons.set(id, state);

      el.querySelector('ellipse').addEventListener('click', (e) => {
        if (!state.popping) {
          const svg  = el.querySelector('svg');
          const rect = svg.getBoundingClientRect();
          const ox = (e.clientX - rect.left) * (680 / rect.width);
          const oy = (e.clientY - rect.top)  * (440 / rect.height);
          popBalloon(id, ox, oy);
        }
      });
    }

    function popBalloon(id, ox, oy) {
      const state = balloons.get(id);
      if (!state) return;
      state.popping = true;

      const body  = state.el.querySelector('.body');
      const burst = state.el.querySelector('.burst');
      const tips  = computeTips(ox, oy);
      const start = performance.now();

      (function frame(now) {
        const t    = Math.min((now - start) / POP_DURATION, 1);
        const ease = 1 - (1 - t) * (1 - t);
        burst.setAttribute('d', burstPath(ease, ox, oy, tips));
        burst.setAttribute('opacity', String(1 - ease));
        body.setAttribute('opacity',  String(1 - ease));
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          state.el.remove();
          balloons.delete(id);
          cFang++; updateCounter();
          spawnBalloon();
        }
      })(start);
    }

    // debounced resize: 250ms Ruhezeit nach letztem Event
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const newW = window.innerWidth;
        const newH = window.innerHeight;
        const sx = newW / prevW;
        const sy = newH / prevH;
        for (const state of balloons.values()) {
          if (state.popping) continue;
          state.left = Math.min(Math.max(state.left * sx, W / 2), newW - W / 2);
          state.top  = state.top * sy;
          state.el.style.left = (state.left - W / 2) + 'px';
          state.el.style.top  = state.top + 'px';
        }
        prevW = newW;
        prevH = newH;
      }, 250);
    });

    function spawnInterval() {
      //return (window.innerHeight / RISE_SPEED * 1000) / BALLOON_COUNT;
      return (RISE_SPEED * 10000) / BALLOON_COUNT;
    }

    function loop(ts) {
      const dt = lastTime ? (ts - lastTime) / 1000 : 0;
      lastTime  = ts;

      // Wind-Timer
      windTimer -= dt * 1000;
      if (windTimer <= 0) applyWind();

      // Spawn
      spawnTimer -= dt * 1000;
      if (spawnTimer <= 0 && balloons.size < BALLOON_COUNT) {
        spawnBalloon();
        spawnTimer = spawnInterval();
      }

      // Ballons bewegen
      for (const [id, state] of balloons) {
        if (state.popping) continue;
        state.age += dt;
        const speed = Math.max(0.05, state.speedFn(state.age)) * RISE_SPEED;
        state.top  -= speed * dt;
        state.el.style.top = state.top + 'px';

        // Ballon am oberen Rand verschwunden → ersetzen
        if (state.top < -H) {
          state.el.remove();
          balloons.delete(id);
          cFlew++; updateCounter();
          spawnBalloon();
        }
      }

      requestAnimationFrame(loop);
    }

    // Initiale Füllung
    for (let i = 0; i < BALLOON_COUNT; i++) {
      setTimeout(spawnBalloon, i * (spawnInterval() / BALLOON_COUNT));
    }
    requestAnimationFrame(loop);
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  </script>
</body>
</html>
